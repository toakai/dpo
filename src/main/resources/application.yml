spring:
#  main:
#    web-application-type: none
  # 环境 dev:开发环境|test:集成测试环境|pro:生产环境
  profiles:
    active: @profiles.active@
#    active: ${profiles.active}

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

mybatis:
  mapper-locations: classpath:net/p5w/dp/mapper/**/*.xml
  type-aliases-package: net.p5w.dp.entity
  configuration:
    map-underscore-to-camel-case: true

# 接口限流配置
ip:
  limit:
    enabled: true
    max-per-minute: 5    # 每分钟最大请求数

# 文件上传配置（默认值，各环境可在 profile 配置中覆盖）
file:
  max-size: 10485760  # 上传文件大小上限（字节），默认 10MB