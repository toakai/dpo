spring:
#  main:
#    web-application-type: none
  # 环境 dev:开发环境|test:集成测试环境|pro:生产环境
  profiles:
    active: @profiles.active@
#    active: ${profiles.active}

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: ${file.max-size:10485760}B   # 与 file.max-size 保持同步，超出时抛 MaxUploadSizeExceededException
      max-request-size: ${file.max-size:10485760}B

server:
  port: 8080

mybatis:
  mapper-locations: classpath:net/p5w/dp/mapper/**/*.xml
  type-aliases-package: net.p5w.dp.entity
  configuration:
    map-underscore-to-camel-case: true

# 接口限流配置
ip:
  limit:
    enabled: true
    max-per-minute: 5       # 滑动窗口内每 IP 最大请求数
    window-size: 60         # 滑动窗口大小（秒）
    clean-interval: 10      # 空队列清理间隔（分钟）

# 签名鉴权配置
auth:
  expire-time: 300000       # 签名/nonce 有效期（毫秒），默认 5 分钟

# 文件上传配置（默认值，各环境可在 profile 配置中覆盖）
file:
  max-size: 10485760  # 上传文件大小上限（字节），默认 10MB
  allowed-types: pdf,jpg,jpeg,png,gif,xlsx,xls,doc,docx  # 允许的文件扩展名（逗号分隔，不含点号）